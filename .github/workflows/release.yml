name: release

# Cut a release by pushing a tag like v0.1.0. Builds the self-contained
# native-backend binary for Linux, macOS (x86_64 + arm64), and Windows,
# packages each with its SHA-256 checksum, and publishes a GitHub Release.
# The binaries embed the `native-backend` feature only: full in-process
# conversion with no LibreDWG/GDAL/PROJ system dependency. Reprojection
# (native-reproject) needs system PROJ >= 9.6 and is intentionally not shipped
# as a prebuilt binary (see docs/DECISIONS.md ADR-009).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --locked --features native-backend --target ${{ matrix.target }}
      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          bin=target/${{ matrix.target }}/release/dwg2geo
          strip "$bin" || true
          name=dwg2geo-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/$name.tar.gz" dwg2geo
          ( cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256" )
      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $name = "dwg2geo-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/dwg2geo.exe" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ascii "dist/$name.zip.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: dwg2geo-${{ matrix.target }}
          path: dist/*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Aggregate checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          echo "--- release assets ---"
          ls -l
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/SHA256SUMS
          generate_release_notes: true
